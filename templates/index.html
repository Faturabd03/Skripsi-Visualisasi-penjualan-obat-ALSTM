<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Penjualan Obat - Apotek Ash-Shihah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #17a2b8;
            --light-primary-color: #e8f9fa;
            --text-color-dark: #1e293b;
            --text-color-light: #64748b;
            --bg-color: #f8fafc;
            --card-border-color: #e2e8f0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color-dark);
        }

        .navbar-custom {
            background-color: #ffffff;
            border-bottom: 2px solid var(--card-border-color);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--text-color-dark);
        }

        .hero-section {
            padding: 4rem 0;
            text-align: center;
        }

        .hero-section h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .hero-section p {
            font-size: 1.125rem;
            color: var(--text-color-light);
            max-width: 600px;
            margin: 0 auto;
        }

        .table-card {
            background-color: #fff;
            border: 1px solid var(--card-border-color);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }
        
        .table-drug {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        .table-drug thead th {
            color: var(--text-color-light);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid var(--card-border-color);
        }

        .table-drug tbody tr {
            transition: background-color 0.2s ease-in-out;
        }

        .table-drug tbody tr:hover {
            background-color: var(--bg-color);
        }

        .table-drug tbody td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--card-border-color);
        }
        
        .table-drug tbody tr:last-child td {
            border-bottom: none;
        }

        .drug-name {
            font-weight: 600;
        }
        
        .drug-description {
            font-size: 0.9rem;
            color: var(--text-color-light);
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            color: #fff;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary-custom:hover {
             background-color: #138496;
             border-color: #117a8b;
             color: #fff;
        }

        .footer {
            padding: 2rem 0;
            margin-top: 4rem;
            text-align: center;
            color: var(--text-color-light);
            font-size: 0.875rem;
        }

    </style>
</head>
<body>
    <nav class="navbar navbar-light navbar-custom">
        <div class="container">
            <span class="navbar-brand">
                Apotek Ash-Shihah
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="hero-section">
            <h1>Prediksi Penjualan Obat</h1>
            <p>Pilih salah satu obat di bawah untuk melihat analisis dan hasil prediksi penjualan di masa depan.</p>
        </div>

        <div class="table-card">
            <table class="table-drug">
                <thead>
                    <tr>
                        <th style="width: 25%;">Nama Obat</th>
                        <th style="width: 50%;">Deskripsi</th>
                        <th style="width: 25%;" class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for drug in drugs %}
                    <tr>
                        <td>
                            <span class="drug-name">{{ drug.name }}</span>
                        </td>
                        <td>
                            <span class="drug-description">{{ drug.description }}</span>
                        </td>
                        <td class="text-center">
                            <a href="{{ url_for('predict', drug_id=drug.id) }}" class="btn-primary-custom">Lihat Prediksi</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <footer class="footer">
        &copy; <span id="current-year"></span> Apotek Ash-Shihah
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
